services:
  app:
    image: vms-engine-dev:latest
    container_name: vms-engine-dev
    working_dir: /opt/lantana
    # CHẠY CÙNG MẠNG HOST → RTSP/UDP không bị chặn (Linux-only)
    network_mode: host
    # GPU (cách 1: đơn giản)
    # gpus: all
    # GPU (cách 2: theo docs Compose Deploy spec)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: -1
              capabilities: [gpu]
    # mount code + models + data để sửa là thấy ngay
    volumes:
      - .:/opt/lantana
      # - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # chạy tiến trình dưới UID:GID của user host (lấy từ .env)
    user: "${APP_UID}:${APP_GID}"
    mem_limit: 5g
    cpus: "5.0"
    # ulimits:
    #   core: -1
    stdin_open: true
    tty: true
    # nếu cần biến môi trường runtime khác, thêm ở đây:
    # environment:
    #   SOME_VAR: ${SOME_VAR:-default}