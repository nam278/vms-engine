property:
  gpu-id: 0
  # gie-unique-id: 1
  batch-size: 8

  onnx-file: "{{MODEL_REPO_ROOT_DIR}}/{{MODEL_NAME}}/{{MODEL_VERSION}}/model.onnx"
  model-engine-file: "{{MODEL_REPO_ROOT_DIR}}/{{MODEL_NAME}}/{{MODEL_VERSION}}/model.plan"

  # 0=FP32, 1=INT8, 2=FP16 (khớp với engine .plan)
  network-mode: 2
  # interval: 3
  cluster-mode: 2
  network-type: 0 # 1 = Classifier, 2 = Detector, 3 = Segmenter

  # === Preprocess (tương đương preprocess trong infer_config cũ) ===
  net-scale-factor: 0.00392156862745098
  model-color-format: 0 # 0=RGB 1=BGR
  maintain-aspect-ratio: 0
  # process-mode: 1

  # === Labels / classes ===
  num-detected-classes: 1
  labelfile-path: "{{COMPONENT_ROOT_DIR}}/labels.txt"

  # === Parser YOLO custom ===
  custom-lib-path: "{{WORKSPACE_PATH}}/plugins/libnvdsinfer_custom_impl_Yolo_padded.so"
  parse-bbox-func-name: "NvDsInferParseYolo"

  # =========================
  # Secondary / operate-on-* (nếu dùng làm SGIE, bỏ comment)
  # =========================
  # process-mode=2                 # 1=Primary (full-frame), 2=Secondary (objects)
  # operate-on-gie-id={{OPERATE_ON_PGIE_ID}}
  # operate-on-class-ids={{OPERATE_ON_CLASS_IDS}}
  secondary-reinfer-interval: 0
  # classifier-async-mode: 1
  # input-object-min-width: 128
  # input-object-min-height: 128

# === NMS / post-cluster (mapping từ nms{confidence, iou, topk}) ===
class-attrs-all:
  pre-cluster-threshold: 0.5 # ~ confidence_threshold
  nms-iou-threshold: 0.5
  topk: 300
