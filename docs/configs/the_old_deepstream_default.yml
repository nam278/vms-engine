# Lantana Core - Pipeline Configuration (Generated by Worker)
# Pipeline ID: vienai-demo
# Pipeline Name: VienAI-Demo
# Worker ID: worker
# Generated At: 2026-03-02T20:32:06.455+00:00Z
# Number of Cameras Configured: 4
# =========================================================================

version: "4.0.2"

application:
  name: "vienai-demo"
  log_file: "/opt/lantana/logs/app.log"
  # gst_log_level: "*:4,GST_PADS:6,GST_ELEMENT_PADS:6"
  gst_log_level: "*:1"
  log_level: "DEBUG" # Bật DEBUG
  gst_dot_file_dir: "/opt/lantana/logs"

  backend:
    type: "deepstream"

  # Global queue configuration (optional - uses defaults if not specified)
  # These settings apply to ALL queues created by QueueManager throughout the pipeline
  # OPTIMIZED FOR: 4-8 cameras + realtime AI + low latency
  queue_config:
    max_size_buffers: 10 # Small buffer for realtime AI processing
    max_size_bytes_mb: 20 # Memory efficient for multiple queues
    max_size_time_seconds: 0.5 # Low latency for realtime
    leaky: 2 # upstream (drop old frames) → prioritize realtime
    silent: true # Suppress queue logging

  # Encoding queue configuration (optional - uses global config if not specified)
  # Larger buffers for encoding path to prevent quality degradation
  # Applied to: per_source OSD → encoder → network sink
  encoding_queue_config:
    max_size_buffers: 20 # More headroom for unstable sources (was 20)
    max_size_bytes_mb: 40 # More headroom for unstable sources (was 40)
    max_size_time_seconds: 1 # More headroom for jitter/backpressure (was 1.5)
    leaky: 2 # downstream: drop OLD frames, keep NEW (prevents per-source freezing)
    silent: true # Suppress queue logging

# --- Nguồn Đầu Vào (Sources) ---
# Sử dụng nvmultiurisrcbin cho tất cả các trường hợp (mode: "multi").
# Nó sẽ xử lý việc decode và mux các stream thành một batch.
# `batch_output_config` sẽ chứa thông tin về batch output từ nvmultiurisrcbin.
sources:
  - id: "multi_rtsp_source"
    name: "RTSP Input Streams for Pipeline vienai-demo"
    enable: true
    type: "rtsp"
    mode: "multi"
    source_names:
      - tang-1-cau-thang
      - tang-1-cua-ra-vao
      - tang-3
      - tang-5
    uris:
      - rtsp://192.168.1.99:8554/view_cam_tang-1-cau-thang
      - rtsp://192.168.1.99:8554/view_cam_tang-1-cua-ra-vao
      - rtsp://192.168.1.99:8554/view_cam_tang-3
      - rtsp://192.168.1.99:8554/view_cam_tang-5
    backend_options:
      deepstream: # Thuộc tính cho nvmultiurisrcbin
        gpu_id: 0
        udp_buffer_size: 4194304
        num_extra_surfaces: 9 # Extra decode surfaces for stability (was 3)
        dec_skip_frames: 0
        smart_record: 2
        smart_rec_dir_path: "/opt/lantana/rec"
        smart_rec_file_prefix: "lsr"
        smart_rec_cache: 10
        smart_rec_container: 0
        smart_rec_mode: 0 # 0=audio+video, 1=video only, 2=audio only
        smart_rec_default_duration: 20
        disable_audio: false # Enable audio for smart recording (no impact on inference)
        # width & height là kích thước output của mỗi stream SAU KHI decode và TRƯỚC KHI mux bởi nvmultiurisrcbin (nếu nó scale),
        # hoặc kích thước mà PGIEn sẽ nhận được cho mỗi frame trong batch.
        width: 1920 # Ví dụ: 1920
        height: 1080 # Ví dụ: 1080
        # max-batch-size của nvmultiurisrcbin. Nên bằng số lượng camera thực tế.
        max_batch_size: 4
        batched_push_timeout: 40000 # micro-seconds (100ms for stable batch formation)
        live_source: true
        drop_pipeline_eos: true
        # Các thuộc tính tùy chỉnh từ camera đầu tiên hoặc giá trị mặc định
        latency: 400
        drop_frame_interval: 0
        rtsp_reconnect_interval: 10
        rtsp_reconnect_attempts: -1
        # Thêm các thuộc tính khác từ cam_params nếu chúng được hỗ trợ bởi nvmultiurisrcbin
        #
        select_rtp_protocol: 4 # (4: ép TCP ở source, 0: auto)
        sync_inputs: false # Đồng bộ hóa các input (0: không, 1: có)

# --- Luồng Xử Lý Chính (Processing Flow) ---
# nvstreammux không còn cần thiết ở đây nếu nvmultiurisrcbin đã làm nhiệm vụ mux.
# Batch size cho PGIEn sẽ là batch_output_config.batch_size.

processing_flow:
  - id: "pgie_phat-hien-khoi-lua_DETECTION"
    role: "primary_inference"
    enable: true
    backend_config:
      deepstream:
        # gpu_id: 0
        mode: "engine"
        unique_id: 1
        config_file_path: "/opt/lantana/pipeline_components/pgie_phat-hien-khoi-lua_DETECTION/package_content/config_infer_engine_placeholder.yml"
        process_mode: 1
        # batch_size: 4
        #         #

  - id: "pgie_phat-hien-nguoi-xe_DETECTION"
    role: "primary_inference"
    enable: true
    backend_config:
      deepstream:
        # gpu_id: 0
        mode: "engine"
        unique_id: 2
        config_file_path: "/opt/lantana/pipeline_components/pgie_phat-hien-nguoi-xe_DETECTION/package_content/config_infer_engine_placeholder.yml"
        process_mode: 1
        # batch_size: 4
        #         #

  - id: "tracker_main"
    role: "tracker"
    enable: true
    backend_config:
      deepstream:
        tracker_width: 640
        tracker_height: 640
        gpu_id: 0
        ll_lib_file: "/opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so"
        ll_config_file: "/opt/lantana/config/config_tracker_NvDCF_perf.yml"
        compute_hw: 1
        user_meta_pool_size: 512

  - id: "sgie_nhan-dien-nguoi_MULTILABEL_CLASSIFICATION"
    role: "secondary_inference"
    enable: true
    backend_config:
      deepstream:
        # gpu_id: 0
        mode: "engine"
        unique_id: 3
        config_file_path: "/opt/lantana/pipeline_components/sgie_nhan-dien-nguoi_MULTILABEL_CLASSIFICATION/package_content/config_infer_engine_placeholder.yml"
        # interval: 0
        operate_on_gie_id: 2
        operate_on_class_ids: "3"
        process_mode: 2
        # batch_size: 9
        #         #

  - id: "demuxer_after_tracker"
    role: "demuxer"
    enable: false
    input_from: "tracker_main"
    backend_config:
      deepstream: {}

# --- Các Thành Phần Hiển Thị (Visuals) ---
visuals:
  enable: true
  tiler:
    enable: true
    id: "tiler"
    role: "tiler"
    backend_config:
      deepstream:
        gpu_id: 0
        rows: 2
        columns: 2
        width: 1920
        height: 1080
        # show_source: 0
  osd:
    enable: true
    id: "osd"
    role: "osd"
    backend_config:
      deepstream:
        gpu_id: 0
        process_mode: 1 # GPU mode (0=CPU, 1=GPU)
        display_bbox: true # Show bounding boxes (same naming as global)
        display_text: true # Show labels (same naming as global)
        display_mask: true # Don't show segmentation masks (same naming as global)

# --- Đích Đầu Ra (Outputs) ---
# `output_configs` là một dict do PipelineOrchestrator chuẩn bị.
outputs:
  - id: "rtsp_client"
    name: "Pipeline vienai-demo RTSP Output"
    enable: true
    type: "rtsp"
    encoding:
      enable: true
      codec: "h264"
      # Bitrate (kbps): Tốc độ bit mục tiêu cho video nén
      # - 2000-3000: 720p quality tốt
      # - 4000-6000: 1080p quality tốt
      # - 8000-15000: 4K quality tốt
      # Giá trị cao hơn = quality tốt hơn nhưng tốn bandwidth và storage
      bitrate_kbps: 5000 # 3 Mbps cho 1080p - optimized for multi-camera (was 5000)
      backend_config:
        deepstream:
          # Control Rate: Kiểm soát bitrate
          # 0 = VBR (Variable): Bitrate thay đổi theo độ phức tạp - quality tốt nhất
          # 1 = CBR (Constant): Bitrate cố định - ổn định cho streaming (KHUYẾN NGHỊ)
          # CBR giúp tránh spikes gây backpressure trong pipeline
          control_rate: 1 # CBR mode for stable streaming

          # Profile: Mức độ nén và tính năng H.264
          # 0 = Baseline: Tương thích rộng, quality thấp nhất, dùng cho thiết bị yếu
          # 1 = Main: Cân bằng giữa quality và tương thích
          # 2 = High: Quality tốt nhất, hỗ trợ CABAC và 8x8 transform
          # Nên dùng High (2) trừ khi client không hỗ trợ
          profile: 1 # H.264 Main Profile

          # Preset: Tốc độ encode vs hiệu quả nén
          # 0 = UltraFast: Encode nhanh nhất, nén kém, bitrate cao
          # 1 = Fast: Cân bằng tốt cho real-time (KHUYẾN NGHỊ cho live streaming)
          # 2 = Medium: Chậm hơn, nén tốt hơn
          # 3 = Slow/HQ: Chậm nhất, nén tốt nhất, dùng cho offline encoding
          # Fast (1) là optimal cho live streaming với GPU
          preset: 1 # Fast preset - optimal cho real-time

          # Iframeinterval: Số frames giữa 2 I-frame (keyframe)
          # I-frame = full frame, P/B-frame = delta từ I-frame
          # - 15: Keyframe mỗi 0.5s (@30fps) - seek nhanh, bitrate cao hơn
          # - 30: Keyframe mỗi 1s (@30fps) - KHUYẾN NGHỊ cho balance
          # - 60: Keyframe mỗi 2s (@30fps) - tiết kiệm bandwidth nhưng seek chậm
          # Giá trị thấp = seek/recover nhanh hơn nhưng tốn bandwidth
          # iframeinterval: 30      # Keyframe mỗi ~1 giây (30 frames)
    destination:
      rtsp:
        mode: "client"
        server_uri: "rtsp://192.168.1.99:8554/vienai-demo"
        protocol: "tcp"

    # Per-source outputs configuration - shared config for all individual camera streams
    per_source_outputs:
      enable: true
      base_name_prefix: "Camera"

      visuals:
        enable: true
        osd:
          enable: true
          backend_config:
            deepstream:
              process_mode: 1 # GPU mode (0=CPU, 1=GPU)
              display_bbox: true # Show bounding boxes (same naming as global)
              display_text: true # Show labels (same naming as global)
              display_mask: true # Don't show segmentation masks (same naming as global)

      encoding:
        enable: true
        codec: "h264"
        bitrate_kbps: 5000
        backend_config:
          deepstream:
            control_rate: 1
            profile: 1
            preset: 1

  # ========================================================================
  # NOTE: output_appsink is NO LONGER NEEDED after Smart Record Migration
  # ========================================================================
  # Migration Date: January 2026
  # Old Architecture (Signal-based): Required appsink output for smart record
  #   - Consumed +40MB memory per pipeline (appsink queue buffers)
  #   - Added +18ms latency (buffer flow through entire pipeline)
  # New Architecture (Probe-based): Direct pad probe on tracker element
  #   - No appsink needed - probe intercepts buffers earlier in pipeline
  #   - Saves 40MB memory + reduces latency by 18ms per pipeline
  #   - Smart record handlers now use "source_from" field to find multiuribin
  #
  # For more details, see: docs/SMART_RECORD_MIGRATION.md
  # ========================================================================

# --- Event Handlers (Dynamic or Static) ---
# ========================================================================
# Smart Record Migration Notes (January 2026):
# ========================================================================
# Smart record now uses PROBE-BASED architecture instead of signal-based.
#
# REQUIRED FIELD for Smart Record handlers: "source_from"
#   - Must match the "id" field from sources section (e.g., "multi_rtsp_source")
#   - Used to locate the nvmultiurisrcbin element in pipeline for recording
#   - Handler attaches probe directly to tracker pad (early interception)
#   - No longer needs appsink output
#
# Benefits of probe-based approach:
#   ✅ -40MB memory per pipeline (no appsink queue)
#   ✅ -18ms latency (probe at tracker vs pipeline end)
#   ✅ ~2% CPU savings (zero-copy buffer access)
#
# Example configuration:
#   sources:
#     - id: "multi_rtsp_source"  # ← This value
#   event_handlers:
#     - id: "smart_record_handler_1"
#       source_from: "multi_rtsp_source"  # ← Must match sources.id
#       type: "on_detect"
#       record: true
# ========================================================================
event_handlers:
  - id: "detect_handler_1"
    source_from: "multi_rtsp_source" # CRITICAL for Smart Record: must match sources.id
    enable: true
    type: "on_detect"
    label_filter:
      - fire
      - person
      - smoke
    evidence_from: "tracker_main"
    record: true

    # Smart Record specific configuration
    pre_event_sec: 2 # Pre-event recording time (2 seconds before detection)
    post_event_sec: 13 # Post-event recording time (13 seconds after detection)
    min_interval_sec: 2 # Minimum 2 seconds between recordings

    mbroker_host: 192.168.1.99
    mbroker_port: 6979
    mbroker_channel: "worker_lsr_video"
  - id: "detect_handler_2"
    enable: true
    type: "on_detect"
    label_filter:
      - fire
      - person
      - smoke
    evidence_from: "sgie_nhan-dien-nguoi_MULTILABEL_CLASSIFICATION"
    snapshot_type: 1 # Enable object cropping

    # Crop handler specific configuration
    save_dir: "/opt/lantana/rec/objects" # Directory for saving cropped images
    capture_interval_sec: 5 # Capture interval per object (5 seconds)
    image_quality: 85 # JPEG quality (0-100)
    save_full_frame: true # Save full frame along with crop
    stale_object_timeout_min: 5 # Timeout for stale objects (5 minutes)
    cleanup_check_interval_batches: 30 # Cleanup check interval (30 batches)
    cleanup_old_image_dirs_days: 7 # Cleanup old directories after 7 days

    # External processing (face recognition)
    ext_proc: true
    min_interval: 1
    ext_proc_enable_osd: false

    processing_rules:
      face:
        enable: true
        endpoint_url: "http://192.168.1.99:8765/api/v1/face/recognize/upload"
        result_json_path: "match.external_id"
        display_json_path: "match.face_name"
        request_query:
          threshold: "0.65"
          skip_detection: "true"
          skip_anti_spoofing: "false"

    mbroker_host: 192.168.1.99
    mbroker_port: 6979
    mbroker_channel: "worker_lsr_snap"
