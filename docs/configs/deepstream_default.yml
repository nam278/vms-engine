# =============================================================================
# VMS Engine — DeepStream Pipeline Configuration
# =============================================================================
# Schema version: 1.0.0
#
# PIPELINE TOPOLOGY (mirrors gst-launch-1.0 left-to-right reading):
#
#   [sources_bin]
#     nvmultiurisrcbin
#
#   [processing_bin]     ← ghost sink pad
#     queue → nvinfer (pgie)
#     queue → nvtracker
#
#   [visuals_bin]         ← ghost sink pad
#     queue → nvmultistreamtiler
#     queue → nvdsosd
#
#   [outputs_bin]
#     queue → nvv4l2h264enc → rtspclientsink
#
# QUEUE RULES:
#   queue: {}         → insert a queue here; inherit from queue_defaults
#   queue: { ... }    → insert a queue here; override specific fields
#   (no queue field)  → no queue inserted before this element
#
# =============================================================================

version: "1.0.0"

# -----------------------------------------------------------------------------
# Pipeline-level metadata
# -----------------------------------------------------------------------------
pipeline:
  id: "de1"
  name: "Intrusion Detection Pipeline"
  log_level: "DEBUG" # DEBUG | INFO | WARN | ERROR
  gst_log_level: "*:1" # GStreamer log categories, e.g. "*:3,GST_PADS:5"
  dot_file_dir: "/opt/vms_engine/dev/logs"
  log_file: "/opt/vms_engine/dev/logs/app.log"

# -----------------------------------------------------------------------------
# Queue defaults — applied to any queue: {} with no overrides
# Tune for: real-time AI, multi-camera, low latency
# -----------------------------------------------------------------------------
queue_defaults:
  max_size_buffers: 10 # small = low latency
  max_size_bytes_mb: 20
  max_size_time_sec: 0.5
  leaky: 2 # 0=none  1=upstream  2=downstream (drop oldest when full → keep newest frames — realtime friendly)
  silent: true

# -----------------------------------------------------------------------------
# Messaging — top-level message broker (producer)
# Events published by probe handlers (on_detect, crop_objects, etc.) are sent here.
# Omit this block entirely to disable publishing (no-op mode).
# type: "redis" | "kafka"   (kafka is a stub — not yet production-ready)
# Handlers publish to a channel specified by the `channel` field (falls back to handler `id` if omitted).
# -----------------------------------------------------------------------------
messaging:
  type: redis
  host: "192.168.1.99"
  port: 6319

# =============================================================================
# STAGE 1 — Sources Block  (→ sources_bin)
# Element: nvmultiurisrcbin
# Handles RTSP decode + batch mux internally (no separate nvstreammux needed)
# =============================================================================
sources:
  type: nvmultiurisrcbin

  # --- Section 1: nvmultiurisrcbin direct properties ---
  # NOTE: ip_address is NOT configurable here — DS8 ip-address setter causes SIGSEGV.
  #       The REST API always binds to 0.0.0.0 (all interfaces).
  # rest_api_port: 0 = disable CivetWeb REST API entirely (avoids port conflicts)
  #                >0 = enable on that port (DS default is 9000)
  # Use the REST API to add/remove streams at runtime via HTTP POST.
  rest_api_port: 9876 # enable DeepStream REST API on this port
  max_batch_size: 4 # max number of sources to mux (NOT batch_size)
  mode: 0 # 0=video-only  1=audio-only

  # --- Section 2: per-source nvurisrcbin properties ---
  gpu_id: 0
  num_extra_surfaces: 9 # extra decoder surfaces for stability
  cudadec_memtype: 0 # 0=device(GPU)  1=pinned  2=unified
  dec_skip_frames: 0 # 0=decode all  1=non-ref only  2=key-only
  drop_frame_interval: 0 # drop every N frames at source (0=none)
  select_rtp_protocol: 4 # 0=multi(UDP+TCP)  4=TCP-only (forced, recommended)
  rtsp_reconnect_interval: 10 # seconds between RTSP reconnects (0=disable)
  rtsp_reconnect_attempts: -1 # number of reconnect attempts (-1=infinite)
  latency: 400 # RTSP jitter buffer latency in ms (default: 100)
  udp_buffer_size: 4194304 # UDP receive buffer bytes = 4MB (default: 524288)
  disable_audio: true # keep audio for smart record; true = skip audio decode
  disable_passthrough: false
  drop_pipeline_eos: true # prevent a single-source EOS from killing the pipeline

  # --- Section 3: nvstreammux passthrough properties ---
  # (these pass through nvmultiurisrcbin to the embedded nvstreammux)
  width: 1920
  height: 1080
  batched_push_timeout: 40000 # µs to wait for a full batch (40ms = comfortable at 4 sources)
  live_source: true
  sync_inputs: false

  cameras:
    - id: camera-ah
      uri: rtsp://192.168.1.99:18554/kho
    - id: camera-hanh-trinh
      uri: rtsp://192.168.1.99:18554/traffic1
    - id: djuong-5
      uri: rtsp://192.168.1.99:18554/test_video
    - id: san
      uri: rtsp://192.168.1.99:18554/traffic2

  # Smart Record — flat integer enum properties on nvmultiurisrcbin
  # NOTE: smart_rec_video_cache is DEPRECATED — use smart_rec_cache instead
  smart_record: 2 # 0=disable  1=cloud-only (no local)  2=multi(cloud+local)
  smart_rec_dir_path: "/opt/vms_engine/dev/rec"
  smart_rec_file_prefix: "lsr"
  smart_rec_cache: 10 # pre-event circular buffer in seconds (audio + video)
  smart_rec_default_duration: 20 # post-event recording length in seconds
  smart_rec_mode: 0 # 0=audio+video  1=video-only  2=audio-only
  smart_rec_container: 0 # 0=mp4  1=mkv

# =============================================================================
# STAGE 2 — Processing Block  (→ processing_bin)
# Elements: nvinfer | nvinferserver, nvtracker, nvstreamdemux
#
# type: nvinfer      → TensorRT direct inference (engine file / ONNX)
# type: nvinferserver → Triton Inference Server (gRPC / HTTP)
#
# process_mode: 1 = Primary (full-frame)  | 2 = Secondary (per-object)
# SGIE-only extras: operate_on_gie_id, operate_on_class_ids
#
# Each `queue` field inserts a GstQueue BEFORE that element (thread boundary).
# Elements are linked in declaration order.
# =============================================================================
processing:
  elements:
    - id: pgie_detection
      type: nvinfer # nvinfer (TensorRT) | nvinferserver (Triton)
      role: primary_inference
      unique_id: 1 # gie-unique-id — identifies metadata downstream
      config_file: "/opt/vms_engine/dev/pipeline_components/pgie_phat-hien-nguoi-xe_DETECTION/package_content/config_infer_engine_placeholder.yml"
      process_mode: 1 # 1=Primary (full-frame) | 2=Secondary (per-object)
      # interval: 3 # skip N batches between inferences (0 = every frame)
      # batch_size: 4 # must equal sources.max_batch_size
      gpu_id: 0
      queue: {} # → queue before pgie (use defaults)

    - id: tracker
      type: nvtracker
      ll_lib_file: "/opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so"
      ll_config_file: "/opt/vms_engine/build/bin/configs/config_tracker_NvDCF_perf.yml"
      tracker_width: 640 # frame is scaled to this width before tracking
      tracker_height: 640
      gpu_id: 0
      compute_hw: 1 # 0=default  1=GPU  2=VIC (Jetson only)
      user_meta_pool_size: 512 # buffer pool for misc tracker output (Re-ID, past-frame, etc.)
      queue: {} # → queue before tracker

    # SGIE example — runs on objects detected by PGIE (process_mode: 2)
    # Uncomment and fill config_file to enable secondary inference.
    #
    - id: sgie_classification
      type: nvinfer # nvinfer (TensorRT) | nvinferserver (Triton)
      role: secondary_inference
      unique_id: 3
      config_file: "/opt/vms_engine/dev/pipeline_components/sgie_nhan-dien-nguoi_MULTILABEL_CLASSIFICATION/package_content/config_infer_engine_placeholder.yml"
      process_mode: 2 # 2=Secondary: runs on objects, NOT full frames
      operate_on_gie_id: 1 # only process objects detected by the GIE with unique_id=1
      operate_on_class_ids: "3" # colon-separated class IDs from parent GIE to process
      # batch_size: 9 # can be larger (processes crops, not full frames)
      gpu_id: 0
      queue: {}

    # - id: demuxer
    #   type: nvstreamdemux
    #   queue: {}                 # → queue before demuxer

# =============================================================================
# STAGE 3 — Visuals Block  (→ visuals_bin)
# Wraps: tiler + osd
# =============================================================================
visuals:
  enable: true
  elements:
    - id: tiler
      type: nvmultistreamtiler
      gpu_id: 0
      rows: 2
      columns: 2
      width: 1920
      height: 1080
      queue: {} # → queue before tiler

    - id: osd
      type: nvdsosd
      gpu_id: 0
      process_mode: 1 # 0=cpu  1=gpu  2=auto
      display_bbox: true
      display_text: true
      display_mask: false
      queue: {} # → queue before osd

# =============================================================================
# STAGE 4 — Outputs Block  (→ outputs_bin)
# Each output is a flat `elements: []` list in GStreamer link order.
# queue: {}  on an element → insert a GstQueue BEFORE it (see queue_defaults).
#
# Full RTSP output chain (confirmed from demo_build_graph.dot):
#   queue → nvvideoconvert → capsfilter → nvv4l2h264enc
#         → queue → h264parse → queue → rtspclientsink
# =============================================================================
outputs:
  - id: rtsp_out
    type: rtsp_client
    elements:
      - id: preencode_convert
        type: nvvideoconvert
        nvbuf_memory_type: nvbuf-mem-cuda-device
        src_crop: "0:0:0:0"
        dest_crop: "0:0:0:0"
        queue: {} # → entry queue before videoconvert (thread boundary from visuals)

      - id: preencode_caps
        type: capsfilter
        caps: "video/x-raw(memory:NVMM), format=(string)NV12, width=(int)1920, height=(int)1080"

      - id: encoder
        type: nvv4l2h264enc # nvv4l2h264enc | nvv4l2h265enc
        bitrate: 4000000 # bps
        control_rate: cbr # cbr | vbr
        profile: main # baseline | main | high
        iframeinterval: 30 # keyframe every N frames

      - id: parser
        type: h264parse # h264parse | h265parse
        queue: # → queue after encoder; absorbs I-frame bitrate bursts
          max_size_buffers: 20
          max_size_bytes_mb: 40
          max_size_time_sec: 1.5
          leaky: 2 # 2=downstream

      - id: sink
        type: rtspclientsink
        location: rtsp://192.168.1.99:8554/de1
        protocols: tcp # tcp | udp
        queue: {} # → queue after parser, before sink (use defaults)

# =============================================================================
# EVENT HANDLERS — GStreamer probe callbacks
# Each handler attaches a pad probe to a named element's src pad.
# =============================================================================
event_handlers:
  # ---------------------------------------------------------------------------
  # PROBE ORDERING NOTE (GStreamer FIFO):
  # Multiple probes on the same pad fire in registration order.
  # class_id_restore MUST be registered before smart_record / crop_objects on
  # tracker:src so those handlers always see the original (restored) class_ids.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Class ID namespace — Offset  (disabled by default)
  # Remaps SGIE class IDs by (gie_unique_id * 1000) to avoid collision with PGIE
  # by probing the tracker's SINK pad BEFORE objects enter nvtracker.
  # Enable when pipeline has 2+ detectors with overlapping class_id ranges.
  # probe_element MUST be the nvtracker element id (same for both handlers).
  # ---------------------------------------------------------------------------
  - id: class_id_offset
    enable: true
    type: on_detect
    probe_element: tracker # nvtracker element id
    pad_name: sink # probe BEFORE tracker (offset class_id going IN)
    trigger: class_id_offset

  # ---------------------------------------------------------------------------
  # Class ID namespace — Restore  (disabled by default)
  # Restores original class IDs on the tracker's SRC pad AFTER nvtracker so
  # downstream handlers (smart_record, crop_objects) see original values.
  # MUST be listed before smart_record and crop_objects (GStreamer FIFO order).
  # ---------------------------------------------------------------------------
  - id: class_id_restore
    enable: true
    type: on_detect
    probe_element: tracker # same element, different pad
    pad_name: src # probe AFTER tracker (restore class_id going OUT)
    trigger: class_id_restore

  # ---------------------------------------------------------------------------
  # Smart Record trigger
  # Probe on tracker src pad → detect objects → trigger smart record on
  # nvmultiurisrcbin (referenced by source_element).
  # ---------------------------------------------------------------------------
  - id: smart_record
    enable: true
    type: on_detect
    probe_element: tracker # attach pad probe to tracker's src pad
    source_element: nvmultiurisrcbin0 # actual element name assigned by SourceBuilder
    trigger: smart_record
    channel: worker_lsr # Redis Stream / Kafka topic to publish smart-record events
    label_filter: [bike, bus, car, person, truck]
    pre_event_sec: 2 # seconds from cache before detection
    post_event_sec: 13
    min_interval_sec: 2 # minimum gap between recordings per camera

  # ---------------------------------------------------------------------------
  # Object crop + optional external processing (e.g. face recognition)
  # Probe on tracker src pad → crop object ROI from NvBufSurface → save JPEG.
  # ---------------------------------------------------------------------------
  - id: crop_objects
    enable: true
    type: on_detect
    probe_element: tracker
    trigger: crop_objects
    channel: worker_lsr_snap # Redis Stream / Kafka topic to publish crop events
    label_filter: [bike, bus, car, person, truck]
    save_dir: "/opt/vms_engine/dev/rec/objects"
    capture_interval_sec: 5 # min seconds between crops for the same track_id
    image_quality: 85 # JPEG quality 0–100
    save_full_frame: true # also save the full frame alongside the crop
    cleanup:
      stale_object_timeout_min: 5 # drop track_id state after N inactive minutes
      check_interval_batches: 30 # run cleanup every N batches
      old_dirs_max_days: 7 # delete image dirs older than N days
    ext_processor:
      enable: true
      min_interval_sec: 1
      rules:
        - label: face
          endpoint: http://192.168.1.99:8000/api/v1/face/recognize/upload
          result_path: match.external_id # JSON path for ID written into object meta
          display_path: match.face_name # JSON path for OSD display label
          params:
            threshold: "0.65"
            skip_anti_spoofing: "false"
